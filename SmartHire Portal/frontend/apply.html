<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHire Portal - Job Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div style="background: #f8f9fa; min-height: calc(100vh - 76px);" class="py-5">
        <div class="container">
            <div id="alert-container"></div>

            <div class="row justify-content-center" id="jobContainer" style="display: none;">
                <div class="col-md-10">
                    <div class="card border-0 shadow-lg overflow-hidden">
                        <div class="bg-primary text-white p-5 text-center" style="background-image: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%)">
                            <h1 class="fw-bold mb-2" id="jobTitle"></h1>
                            <p class="lead opacity-75 mb-0"><span id="jobCompany"></span> • <span id="jobLocation"></span></p>
                        </div>
                        <div class="card-body p-5">
                            <div class="d-flex justify-content-center gap-3 mb-5">
                                <span class="badge bg-light text-dark border px-3 py-2 fs-6 fw-normal" id="jobDate"></span>
                                <span class="badge bg-light text-dark border px-3 py-2 fs-6 fw-normal" id="jobTypeBadge"></span>
                                <span class="badge px-3 py-2 fs-6 fw-normal" id="jobStatusBadge"></span>
                            </div>

                            <h4 class="fw-bold mb-3 text-primary-custom">Job Description</h4>
                            <p class="mb-5 text-muted" style="white-space: pre-line; line-height: 1.7" id="jobDesc"></p>

                            <h4 class="fw-bold mb-3 text-primary-custom">Skills Required</h4>
                            <div class="mb-5" id="jobSkills"></div>

                            <div class="text-center border-top pt-5" id="actionContainer">
                                <!-- Actions injected via JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="loadingContainer" class="d-flex justify-content-center align-items-center" style="min-height: 400px">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>

        <!-- Apply Modal -->
        <div class="modal fade" id="applyModal" tabindex="-1" aria-labelledby="applyModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold" id="applyModalLabel">Apply for Job</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-4">
                        <form id="applyForm">
                            <div class="mb-4">
                                <label class="form-label fw-medium">Upload Resume (PDF)</label>
                                <input type="file" id="resumeFile" class="form-control" accept="application/pdf" required>
                                <div class="form-text text-muted">
                                    Please upload your resume specifically for this job application.
                                </div>
                            </div>
                            <div class="d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary" id="btnSubmitApp">Submit Application</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/apply.js"></script>
</body>
</html>

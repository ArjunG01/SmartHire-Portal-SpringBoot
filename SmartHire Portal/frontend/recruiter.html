<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHire Portal - Recruiter Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container py-5">
        <!-- View Jobs (Main Dashboard) -->
        <div id="viewJobsContainer" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-5 flex-wrap gap-3">
                <div>
                    <h2 class="fw-bold mb-1">Recruiter Hub</h2>
                    <p class="text-muted mb-0">Manage your job postings and applicants</p>
                </div>
                <button class="btn btn-primary btn-lg px-4 shadow-sm" id="btnOpenCreateModal">+ Post New Job</button>
            </div>

            <div class="row" id="myJobsList">
                <div class="col-12 text-center py-5">Loading jobs...</div>
            </div>
        </div>

        <!-- View Applications -->
        <div id="viewApplicationsContainer" style="display: none;">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="recruiter.html">Dashboard</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Applicants</li>
                </ol>
            </nav>

            <h2 class="mb-4 fw-bold">Applicants Review</h2>
            <div id="appsAlertContainer"></div>

            <div class="card border-0 shadow-sm overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="bg-light">
                            <tr>
                                <th class="py-3 ps-4 border-0">Candidate</th>
                                <th class="py-3 border-0">Contact</th>
                                <th class="py-3 border-0">Applied On</th>
                                <th class="py-3 border-0">Resume</th>
                                <th class="py-3 border-0">Status</th>
                                <th class="py-3 pe-4 border-0 text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="applicationsTableBody">
                            <tr><td colspan="6" class="text-center py-5 text-muted">Loading applicants...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Job Modal -->
    <div class="modal fade" id="jobModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="jobModalTitle">Post a New Job</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="jobForm">
                        <input type="hidden" id="jobId">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Job Title</label>
                                <input type="text" id="jobTitle" class="form-control" required placeholder="e.g. Senior Developer">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Company Name</label>
                                <input type="text" id="jobCompany" class="form-control" required placeholder="e.g. Acme Corp">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Location</label>
                                <input type="text" id="jobLocation" class="form-control" required placeholder="e.g. Remote / New York">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Job Type</label>
                                <select id="jobType" class="form-select" required>
                                    <option value="Full-time">Full-time</option>
                                    <option value="Part-time">Part-time</option>
                                    <option value="Contract">Contract</option>
                                    <option value="Internship">Internship</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Vacancy</label>
                                <input type="number" id="jobVacancy" class="form-control" min="1" required value="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Status</label>
                                <select id="jobStatus" class="form-select" required>
                                    <option value="OPEN">Open</option>
                                    <option value="FILLED">Filled</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Description</label>
                            <textarea id="jobDesc" rows="5" class="form-control" required placeholder="Detailed job description..."></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium">Skills Required (comma separated)</label>
                            <input type="text" id="jobSkills" class="form-control" required placeholder="e.g. Java, React, SQL">
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary px-4" id="btnSubmitJob">Post Job</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js?v=2"></script>
    <script src="js/recruiter.js?v=4"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHire Portal - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-check-input:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div style="background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%); min-height: 100vh; display: flex; align-items: center; padding: 2rem 0;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card auth-card p-0">
                        <div class="auth-header text-center p-4" style="background: linear-gradient(135deg, var(--primary), #7C3AED); color: white;">
                            <h3 class="mb-0">Create an Account</h3>
                            <p class="mb-0 opacity-75">Join SmartHire today</p>
                        </div>
                        <div class="card-body p-4">
                            <div id="alert-container"></div>
                            <form id="registerForm">
                                <div class="row">
                                    <div class="col-md-12">
                                        <div class="mb-3">
                                            <label class="form-label fw-medium">I want to...</label>
                                            <div class="d-flex gap-2">
                                                <div class="form-check border rounded p-3 w-50">
                                                    <input class="form-check-input" type="radio" name="role" id="roleSeeker" value="JOB_SEEKER" checked>
                                                    <label class="form-check-label ms-1" for="roleSeeker">
                                                        Find a Job
                                                    </label>
                                                </div>
                                                <div class="form-check border rounded p-3 w-50">
                                                    <input class="form-check-input" type="radio" name="role" id="roleRecruiter" value="RECRUITER">
                                                    <label class="form-check-label ms-1" for="roleRecruiter">
                                                        Hire Talent
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-medium">Username</label>
                                    <input type="text" name="username" id="username" class="form-control" required placeholder="Desired username">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-medium">Email Address</label>
                                    <input type="email" name="email" id="email" class="form-control" required placeholder="name@example.com">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-medium">Password</label>
                                    <input type="password" name="password" id="password" class="form-control" required placeholder="Strong password">
                                </div>

                                <div class="mb-4" id="summaryGroup">
                                    <label class="form-label fw-medium">Short Profile Summary</label>
                                    <textarea name="profileSummary" id="profileSummary" rows="3" class="form-control" placeholder="Briefly describe your skills and experience..."></textarea>
                                </div>

                                <button class="btn btn-primary w-100 btn-lg mb-3" type="submit">Create Account</button>
                            </form>
                            <div class="text-center mt-3">
                                <span class="text-muted">Already have an account? </span>
                                <a href="login.html" class="fw-bold text-primary-custom text-decoration-none">Login</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/register.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHire Portal - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container py-5">
        <h2 class="mb-4 fw-bold">My Dashboard</h2>
        <div id="alert-container"></div>

        <div class="row mb-5">
            <div class="col-md-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-4 text-primary-custom">Profile & Resume</h4>
                        <div class="row">
                            <div class="col-md-6">
                                <p class="mb-2"><strong class="text-muted">Username:</strong> <span class="fw-medium" id="pUsername"></span></p>
                                <p class="mb-4"><strong class="text-muted">Email:</strong> <span class="fw-medium" id="pEmail"></span></p>

                                <div class="bg-light p-3 rounded mb-3">
                                    <div class="d-flex align-items-center">
                                        <span class="fs-3 me-3">📄</span>
                                        <div>
                                            <small class="text-muted d-block">Current Resume</small>
                                            <strong id="resumeNameTxt">Loading...</strong>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="border rounded p-4 h-100">
                                    <h6 class="fw-bold mb-3">Update Resume</h6>
                                    <form id="uploadResumeForm">
                                        <div class="mb-3">
                                            <label class="form-label small text-muted">Select PDF file</label>
                                            <input type="file" id="resumeFileInput" class="form-control" accept="application/pdf">
                                        </div>
                                        <div class="text-end">
                                            <button type="submit" class="btn btn-primary" id="btnUpload" disabled>Upload New Resume</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h4 class="mb-3 fw-bold">Application History</h4>
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="bg-light">
                        <tr>
                            <th class="py-3 ps-4 border-0">Job Title</th>
                            <th class="py-3 border-0">Company</th>
                            <th class="py-3 border-0">Applied Date</th>
                            <th class="py-3 pe-4 border-0 text-end">Status</th>
                        </tr>
                    </thead>
                    <tbody id="applicationsTableBody">
                        <tr><td colspan="4" class="text-center py-5 text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>

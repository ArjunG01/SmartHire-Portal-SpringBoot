<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHire Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div style="background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%); min-height: calc(100vh - 76px); display: flex; align-items: center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card auth-card p-0">
                        <div class="auth-header text-center p-4" style="background: linear-gradient(135deg, var(--primary), #7C3AED); color: white;">
                            <h3 class="mb-0">Welcome Back</h3>
                            <p class="mb-0 opacity-75">Login to your account</p>
                        </div>
                        <div class="card-body p-4">
                            <div id="alert-container"></div>
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label class="form-label fw-medium">Username</label>
                                    <input type="text" id="username" class="form-control" required placeholder="Enter your username">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-medium">Password</label>
                                    <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                                </div>
                                <button class="btn btn-primary w-100 btn-lg mb-3" type="submit">Login</button>
                            </form>
                            <div class="text-center mt-3">
                                <span class="text-muted">Don't have an account? </span>
                                <a href="register.html" class="fw-bold text-primary-custom text-decoration-none">Sign Up</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
